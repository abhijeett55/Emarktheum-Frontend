<div class="container py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="gradient-text">All Cryptocurrencies</h2>
    <div class="market-stats">
      <span class="badge bg-glass me-2">Market Cap: $2.4T</span>
      <span class="badge bg-glass">24h Vol: $98.5B</span>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-lg-2 col-md-3 col-sm-4 col-6" *ngFor="let coin of cryptos">
      <div class="crypto-card glass-effect">
        <div class="card-content">
          <div class="coin-image-wrapper">
            <img [src]="coin.image" [alt]="coin.name" class="coin-image">
            <div class="rank-badge" *ngIf="coin.market_cap_rank">#{{coin.market_cap_rank}}</div>
          </div>
          
          <div class="coin-info">
            <h5 class="coin-name">{{coin.name}}</h5>
            <p class="coin-symbol">{{coin.symbol | uppercase}}</p>
            
            <h4 class="coin-price">${{coin.current_price | number:'1.2-2'}}</h4>
            
            <p class="price-change mb-3" 
               [class.green]="coin.price_change_percentage_24h > 0"
               [class.red]="coin.price_change_percentage_24h < 0">
              <i class="bi" [ngClass]="{
                'bi-arrow-up-short': coin.price_change_percentage_24h > 0,
                'bi-arrow-down-short': coin.price_change_percentage_24h < 0
              }"></i>
              {{coin.price_change_percentage_24h | number:'1.2-2'}}%
            </p>
          </div>

          <div class="action-buttons">
            <button class="btn btn-buy" (click)="navigateToBuy(coin.id)">
              <i class="bi bi-coin me-1"></i>Buy
            </button>
            <button class="btn btn-sell" (click)="navigateToSell(coin.id)">
              <i class="bi bi-cash-stack me-1"></i>Sell
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
