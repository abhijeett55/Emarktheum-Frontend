<div class="login-area rn-section-gapTop" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8 col-sm-12">
                <div class="form-wrapper-one shadow-sm p-5 border-radius-10">
                    <div class="text-center mb-5">
                        <h4 class="title">Login to Your Account</h4>
                        <p>Enter your details below</p>
                    </div>

                    <form *ngIf="!isLoggedIn" name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
                        
                        <div class="mb-4">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" class="form-control" name="username"
                                [(ngModel)]="form.username" required #username="ngModel" 
                                [class.is-invalid]="f.submitted && username.errors" />
                            
                            <div class="invalid-feedback" *ngIf="f.submitted && username.errors">
                                Username is required!
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" name="password"
                                [(ngModel)]="form.password" required minlength="6" #password="ngModel"
                                [class.is-invalid]="f.submitted && password.errors" />
                            
                            <div class="invalid-feedback" *ngIf="f.submitted && password.errors">
                                <span *ngIf="password.errors['required']">Password is required</span>
                                <span *ngIf="password.errors['minlength']">Must be at least 6 characters</span>
                            </div>
                        </div>

                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="rn-check-box">
                                <input type="checkbox" class="rn-check-box-input" id="rememberMe">
                                <label class="rn-check-box-label" for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="btn-link small">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">Log In</button>
                        
                        <div class="alert alert-danger mt-3" role="alert" *ngIf="f.submitted && isLoginFailed">
                            <strong>Login failed:</strong> {{ errorMessage }}
                        </div>
                    </form>

                    <div class="alert alert-success text-center" *ngIf="isLoggedIn">
                        <h5>Welcome back!</h5>
                        <p>Logged in as: <strong>{{ roles }}</strong></p>
                        <a routerLink="/" class="btn btn-outline-success btn-sm">Go to Dashboard</a>
                    </div>

                    <div class="text-center mt-4">
                        <p>Don't have an account? <a href="sign-up.html" class="color-primary">Sign Up</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
